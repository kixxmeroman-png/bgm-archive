<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BGM 아카이브</title>
    <!-- 프리텐다드 웹폰트 로드 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <!-- 테일윈드 CSS 라이브러리 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 드래그 앤 드롭 정렬을 위한 SortableJS 라이브러리 추가 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'custom-blue': '#2563eb',
                        'custom-blue-hover': '#1d4ed8',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: "Pretendard Variable", Pretendard, sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        /* 드래그 중인 아이템 스타일 */
        .sortable-ghost { opacity: 0.4; background-color: #eff6ff; border: 2px dashed #3b82f6 !important; }
        .sortable-drag { opacity: 0.9; }
        /* 드래그 핸들 커서 스타일 */
        .drag-handle { cursor: grab; }
        .drag-handle:active { cursor: grabbing; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

    <!-- 상단 헤더 바 -->
    <header class="bg-white border-b border-gray-200 px-6 py-4 flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 sticky top-0 z-40 shadow-xs">
        <div>
            <h1 class="text-2xl font-extrabold text-custom-blue">BGM 아카이브</h1>
            <p class="text-gray-400 text-xs mt-0.5">유튜브 링크를 폴더와 플레이리스트로 관리하는 아카이브</p>
        </div>
        <div class="flex items-center gap-2">
            <!-- 플레이리스트 추가 버튼 색상 -->
            <button onclick="openPlaylistModal()" class="bg-custom-blue hover:bg-custom-blue-hover text-white px-4 py-2 rounded-lg text-sm font-semibold transition-colors flex items-center gap-2 shadow-xs cursor-pointer whitespace-nowrap">
                재생목록 추가
            </button>
            <button onclick="openAddModal()" class="bg-custom-blue hover:bg-custom-blue-hover text-white px-4 py-2 rounded-lg text-sm font-semibold transition-colors flex items-center gap-2 shadow-xs cursor-pointer whitespace-nowrap">
                BGM 추가
            </button>
        </div>
    </header>

    <!-- 메인 레이아웃 -->
    <div class="flex-1 flex flex-col md:flex-row max-w-[1600px] w-full mx-auto p-4 md:p-6 gap-6">
        
        <!-- 좌측 사이드바 영역 -->
        <aside class="w-full md:w-64 shrink-0 space-y-6">
            <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-xs space-y-5 sticky top-24">
                
                <!-- 전체보기 -->
                <div>
                    <button onclick="setFilter('all', null)" id="btn-filter-all" class="w-full text-left text-sm px-3 py-2 rounded-lg block transition-all font-extrabold bg-blue-50 text-custom-blue border border-blue-100 cursor-pointer">
                        📁 전체 BGM 보기 (<span id="sidebar-all-count">0</span>)
                    </button>
                </div>

                <!-- 폴더 섹션 -->
                <div class="space-y-2">
                    <div class="flex justify-between items-center border-b border-gray-100 pb-1">
                        <span class="text-xs font-bold text-gray-400">📁 폴더 목록</span>
                        <button onclick="openContainerModal('folder')" class="text-xs text-custom-blue hover:text-custom-blue-hover font-bold px-1 cursor-pointer" title="폴더 추가">추가</button>
                    </div>
                    <div id="sidebar-folders" class="space-y-0.5 max-h-44 overflow-y-auto pt-1 w-full overflow-x-hidden"></div>
                </div>

                <!-- 플레이리스트 섹션 -->
                <div class="space-y-2">
                    <div class="flex justify-between items-center border-b border-gray-100 pb-1">
                        <span class="text-xs font-bold text-gray-400">🎧 플레이리스트</span>
                        <button onclick="openContainerModal('playlist')" class="text-xs text-custom-blue hover:text-custom-blue-hover font-bold px-1 cursor-pointer" title="플레이리스트 추가">추가</button>
                    </div>
                    <div id="sidebar-playlists" class="space-y-0.5 max-h-44 overflow-y-auto pt-1 w-full overflow-x-hidden"></div>
                </div>

                <!-- 태그 클라우드 섹션 -->
                <div class="space-y-2">
                    <div class="border-b border-gray-100 pb-1">
                        <span class="text-xs font-bold text-gray-400">🏷️ 태그 필터</span>
                    </div>
                    <div id="sidebar-tags" class="flex flex-wrap gap-1 max-h-40 overflow-y-auto pt-1"></div>
                </div>

            </div>
        </aside>

        <!-- 우측 메인 콘텐츠 대시보드 -->
        <main class="flex-1 bg-white p-5 rounded-xl border border-gray-200 shadow-xs min-h-[600px] flex flex-col">
            <!-- 대시보드 제어 헤더 -->
            <div class="flex flex-col xl:flex-row xl:justify-between xl:items-center gap-3 mb-5 border-b border-gray-100 pb-3">
                <div class="flex items-center gap-3">
                    <h2 id="list-title" class="text-lg font-bold text-gray-800">전체 BGM 목록</h2>
                    <span id="bgm-count" class="text-xs bg-gray-100 text-gray-600 px-2.5 py-0.5 rounded-full font-semibold">0개</span>
                </div>
                
                <div class="flex flex-wrap items-center gap-3 self-end xl:self-auto">
                    
                    <!-- 정렬 메뉴 대대적 수정 (타이틀 삭제, 깔끔한 3종 나열) -->
                    <div class="flex bg-gray-100 p-1 rounded-lg border border-gray-200/50 shrink-0 items-center">
                        <button id="btn-sort-reg" onclick="setSortMode('reg')" class="px-3 py-1 text-xs font-semibold rounded-md bg-white text-gray-800 shadow-xs cursor-pointer whitespace-nowrap">등록순</button>
                        <button id="btn-sort-abc" onclick="setSortMode('abc')" class="px-3 py-1 text-xs font-semibold rounded-md text-gray-500 cursor-pointer whitespace-nowrap">이름순</button>
                        <button id="btn-sort-drag" onclick="setSortMode('drag')" class="px-3 py-1 text-xs font-semibold rounded-md text-gray-500 cursor-pointer whitespace-nowrap" title="마우스로 순서를 직접 끌어당겨 변경합니다.">자유 정렬</button>
                    </div>

                    <!-- 데이터 내보내기 드롭다운 메뉴 영역 -->
                    <div class="relative inline-block text-left">
                        <button onclick="toggleExportMenu(event)" id="btn-export" class="bg-gray-50 hover:bg-gray-100 text-gray-600 border border-gray-200 px-3 py-1.5 rounded-lg text-xs font-semibold cursor-pointer transition-colors flex items-center gap-1.5 whitespace-nowrap">
                            데이터 내보내기 <span class="text-[9px]">▼</span>
                        </button>
                        <div id="export-dropdown" class="hidden absolute right-0 mt-1.5 window bg-white border border-gray-200 rounded-lg shadow-lg z-50 overflow-hidden py-1">
                            <button onclick="downloadBackupJSON()" class="w-full text-left px-4 py-2 text-xs text-gray-700 hover:bg-gray-50 flex items-center gap-2 cursor-pointer">
                                📄 JSON 백업 파일
                            </button>
                            <button onclick="downloadBackupCSV()" class="w-full text-left px-4 py-2 text-xs text-gray-700 hover:bg-gray-50 flex items-center gap-2 border-t border-gray-100 cursor-pointer">
                                📊 CSV 파일 (엑셀용)
                            </button>
                        </div>
                    </div>

                    <!-- 카드 크기 조절기 -->
                    <div id="card-scale-controller" class="hidden flex items-center gap-2 bg-gray-50 px-2.5 py-1.5 rounded-lg border border-gray-200">
                        <span class="text-xs text-gray-500 font-medium whitespace-nowrap">열 개수:</span>
                        <input type="range" id="card-cols-range" min="2" max="5" value="3" oninput="changeCardCols(this.value)" class="w-16 h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-[#2563eb]">
                        <span id="card-cols-txt" class="text-xs font-bold text-custom-blue whitespace-nowrap">3개</span>
                    </div>

                    <!-- 뷰 모드 전환 그룹 -->
                    <div class="flex bg-gray-100 p-1 rounded-lg border border-gray-200/50 shrink-0">
                        <button id="btn-view-list" onclick="setViewMode('list')" class="px-2.5 py-1 text-xs font-semibold rounded-md bg-white text-gray-800 shadow-xs cursor-pointer whitespace-nowrap">리스트</button>
                        <button id="btn-view-list2" onclick="setViewMode('list2')" class="px-2.5 py-1 text-xs font-semibold rounded-md text-gray-500 cursor-pointer whitespace-nowrap">리스트(2줄)</button>
                        <button id="btn-view-card" onclick="setViewMode('card')" class="px-2.5 py-1 text-xs font-semibold rounded-md text-gray-500 cursor-pointer whitespace-nowrap">카드(섬네일)</button>
                    </div>
                </div>
            </div>

            <!-- 검색바 -->
            <div class="mb-4">
                <input type="text" id="search-input" oninput="renderBgmList()" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2 text-sm text-gray-800 focus:outline-none focus:border-custom-blue" placeholder="보관함 내 이름, 유튜브 오리지널 명, 메모, 태그로 검색...">
            </div>

            <!-- BGM 메인 뷰포트 컨테이너 -->
            <div id="bgm-list" class="flex-1 max-h-[700px] overflow-y-auto pr-1"></div>
        </main>

    </div>

    <!-- [팝업] 유튜브 재생목록 일괄 등록 팝업 -->
    <div id="playlist-modal" class="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-white rounded-xl max-w-lg w-full overflow-hidden shadow-xl border border-gray-100 p-6 space-y-4">
            <div class="flex justify-between items-center border-b border-gray-100 pb-2">
                <h3 class="text-lg font-bold text-custom-blue">유튜브 재생목록 일괄 등록</h3>
                <button onclick="closePlaylistModal()" class="text-gray-400 hover:text-gray-600 text-sm cursor-pointer">✕</button>
            </div>
            
            <div class="space-y-1">
                <label class="block text-xs font-bold text-gray-500">유튜브 재생목록 주소(URL) 입력</label>
                <input type="text" id="playlist-url-input" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2.5 text-xs text-gray-800 focus:outline-none focus:border-custom-blue mt-1.5" placeholder="예시) https://www.youtube.com/playlist?list=PLxxxxxxxxxxxx">
                <p class="text-[10px] text-gray-400 mt-1">※ 전체 공개 또는 일부 공개된 재생목록만 파싱이 가능합니다.</p>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">소속 폴더 설정 (선택)</label>
                <select id="playlist-target-folder" class="w-full bg-gray-50 border border-gray-200 rounded-md p-2 text-xs text-gray-800 focus:outline-none"></select>
            </div>

            <div class="flex justify-end gap-2 pt-2 border-t border-gray-100">
                <button onclick="closePlaylistModal()" class="bg-gray-100 hover:bg-gray-200 text-gray-600 text-xs px-4 py-2 rounded-lg font-semibold cursor-pointer">취소</button>
                <button onclick="fetchAndAddPlaylist()" id="playlist-btn" class="bg-custom-blue hover:bg-custom-blue-hover text-white text-xs px-4 py-2 rounded-lg font-semibold cursor-pointer min-w-[100px] text-center">불러오기</button>
            </div>
        </div>
    </div>

    <!-- [팝업 1] BGM 일괄 추가 팝업 -->
    <div id="add-modal" class="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-white rounded-xl max-w-lg w-full overflow-hidden shadow-xl border border-gray-100 p-6 space-y-4">
            <div class="flex justify-between items-center border-b border-gray-100 pb-2">
                <h3 class="text-lg font-bold text-custom-blue">BGM 일괄 추가하기</h3>
                <button onclick="closeAddModal()" class="text-gray-400 hover:text-gray-600 text-sm cursor-pointer">✕</button>
            </div>
            
            <div class="space-y-1">
                <label class="block text-xs font-bold text-gray-500">유튜브 주소 명단 작성</label>
                <p class="text-[11px] text-gray-400 leading-relaxed">줄바꿈으로 구분해 여러 개 등록 가능합니다.<br><b class="text-gray-600">💡 양식:</b> <span class="bg-gray-100 px-1 rounded text-custom-blue font-mono">지정할 이름 - 유튜브링크</span></p>
                <textarea id="input-links" rows="6" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2.5 text-xs text-gray-800 font-mono focus:outline-none focus:border-custom-blue mt-1.5" placeholder="예시)&#10;평화로운 대화 - https://www.youtube.com/watch?v=XXXXX&#10;https://youtu.be/YYYYY"></textarea>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">초기 소속 폴더 설정 (선택)</label>
                <select id="select-target-folder" class="w-full bg-gray-50 border border-gray-200 rounded-md p-2 text-xs text-gray-800 focus:outline-none"></select>
            </div>

            <div class="flex justify-end gap-2 pt-2 border-t border-gray-100">
                <button onclick="closeAddModal()" class="bg-gray-100 hover:bg-gray-200 text-gray-600 text-xs px-4 py-2 rounded-lg font-semibold cursor-pointer">취소</button>
                <button onclick="addMultipleBgm()" class="bg-custom-blue hover:bg-custom-blue-hover text-white text-xs px-4 py-2 rounded-lg font-semibold cursor-pointer min-w-[100px] text-center">보관함에 저장</button>
            </div>
        </div>
    </div>

    <!-- [팝업 2] 그룹(폴더/플리) 통합 관리 팝업 -->
    <div id="container-modal" class="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-white rounded-xl max-w-md w-full overflow-hidden shadow-xl border border-gray-100 p-6 space-y-4">
            <div class="flex justify-between items-center border-b border-gray-100 pb-2">
                <h3 id="container-modal-title" class="text-base font-bold text-custom-blue">그룹 만들기</h3>
                <button onclick="closeContainerModal()" class="text-gray-400 hover:text-gray-600 text-sm cursor-pointer">✕</button>
            </div>
            <input type="hidden" id="container-modal-type">
            <div class="space-y-1">
                <label class="block text-xs font-bold text-gray-500 mb-1">생성할 명칭 입력</label>
                <input type="text" id="container-modal-input" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2.5 text-sm text-gray-800 focus:outline-none focus:border-custom-blue" placeholder="이름을 입력하세요...">
            </div>
            <div class="flex justify-end gap-2 pt-2 border-t border-gray-100">
                <button onclick="closeContainerModal()" class="bg-gray-100 hover:bg-gray-200 text-gray-600 text-xs px-4 py-2 rounded-lg font-semibold cursor-pointer">취소</button>
                <button onclick="submitContainerForm()" class="bg-custom-blue hover:bg-custom-blue-hover text-white text-xs px-4 py-2 rounded-lg font-semibold cursor-pointer min-w-[70px] text-center">생성 및 저장</button>
            </div>
        </div>
    </div>

    <!-- [팝업 3] 상세 정보 창 및 플레이어 통합 팝업 -->
    <div id="bgm-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-white rounded-2xl max-w-xl w-full overflow-hidden shadow-2xl border border-gray-100">
            
            <!-- 플레이어 구역 -->
            <div class="w-full bg-black aspect-video flex items-center justify-center relative shadow-inner">
                <div id="iframe-player-holder" class="w-full h-full"></div>
            </div>

            <!-- 세부 데이터 제어 폼 -->
            <div class="px-5 pt-2.5 pb-4 space-y-2.5 max-h-[40vh] overflow-y-auto">
                <input type="hidden" id="modal-bgm-id">
                
                <!-- 소속/플리 뱃지 라인 -->
                <div id="modal-belong-info" class="text-xs bg-slate-50 border border-slate-200 text-slate-600 rounded-lg p-2.5 space-y-2"></div>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1">보관함 표기명 (나만의 이름)</label>
                        <input type="text" id="modal-custom-title" class="w-full bg-gray-50 border border-gray-200 text-xs p-1.5 rounded-lg focus:outline-none focus:border-custom-blue font-bold text-gray-800 h-[33.6px]">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1">유튜브 원본 타이틀 (수정 가능)</label>
                        <input type="text" id="modal-real-title" class="w-full bg-gray-50 border border-gray-200 text-xs p-1.5 rounded-lg text-gray-700 focus:outline-none focus:border-custom-blue h-[33.6px]">
                    </div>
                </div>

                <div class="bg-blue-50/50 border border-blue-100 rounded-xl p-3 grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[11px] font-bold text-gray-500 mb-1">소속 폴더 변경</label>
                        <select id="modal-select-folder" class="w-full bg-white border border-gray-200 text-xs p-1.5 rounded focus:outline-none"></select>
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-gray-500 mb-1">플레이리스트 등록</label>
                        <select id="modal-select-playlist" onchange="addPlaylistFromModal(this.value); this.value='';" class="w-full bg-white border border-gray-200 text-xs p-1.5 rounded focus:outline-none"></select>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1">메모</label>
                        <textarea id="modal-memo" rows="2" class="w-full bg-gray-50 border border-gray-200 text-xs p-2 rounded-lg focus:outline-none focus:border-custom-blue text-gray-600" placeholder="메모 작성"></textarea>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1">태그 (쉼표로 분리)</label>
                        <textarea id="modal-tags" rows="2" class="w-full bg-gray-50 border border-gray-200 text-xs p-2 rounded-lg focus:outline-none focus:border-custom-blue text-gray-700" placeholder="예: 잔잔한, 전투, 보스전"></textarea>
                    </div>
                </div>
            </div>

            <!-- 풋터 액션 컨트롤 영역 -->
            <div class="bg-gray-50 px-5 py-3 flex justify-between items-center border-t border-gray-100">
                <button onclick="deleteBgmFromModal()" class="text-xs bg-rose-50 hover:bg-rose-100 border border-rose-200 text-rose-600 px-3 py-2 rounded-lg font-medium cursor-pointer whitespace-nowrap">삭제</button>
                <div class="flex gap-2">
                    <button onclick="closeModal()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 text-xs px-4 py-2 rounded-lg font-semibold cursor-pointer whitespace-nowrap">닫기 (정지)</button>
                    <button onclick="saveModalDetails()" class="bg-custom-blue hover:bg-custom-blue-hover text-white text-xs px-4 py-2 rounded-lg font-semibold cursor-pointer shadow-xs whitespace-nowrap">변경사항 저장</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 알림 토스트 -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-4 py-2 rounded-xl shadow-2xl text-xs font-semibold transition-opacity opacity-0 pointer-events-none z-[99999]"></div>

    <script>
        let bgms = JSON.parse(localStorage.getItem('box_bgms')) || [];
        let folders = JSON.parse(localStorage.getItem('box_folders')) || [];
        let playlists = JSON.parse(localStorage.getItem('box_playlists')) || [];
        
        let currentFilter = { type: 'all', id: null }; 
        let viewMode = 'list'; 
        let cardCols = 3; 
        let sortMode = localStorage.getItem('box_sort_mode') || 'reg'; 
        let sortableInstance = null; 

        function saveData() {
            localStorage.setItem('box_bgms', JSON.stringify(bgms));
            localStorage.setItem('box_folders', JSON.stringify(folders));
            localStorage.setItem('box_playlists', JSON.stringify(playlists));
        }

        function toggleExportMenu(event) {
            if(event) event.stopPropagation();
            const menu = document.getElementById('export-dropdown');
            menu.classList.toggle('hidden');
        }

        window.addEventListener('click', function() {
            const menu = document.getElementById('export-dropdown');
            if(menu) menu.classList.add('hidden');
        });

        function downloadBackupJSON() {
            if (bgms.length === 0 && folders.length === 0 && playlists.length === 0) {
                showToast("백업할 데이터가 비어 있습니다.");
                return;
            }
            const backupPayload = {
                bgms: bgms,
                folders: folders,
                playlists: playlists,
                exportedAt: new Date().toISOString()
            };
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backupPayload, null, 4));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);

        function downloadBackupCSV() {
            if (bgms.length === 0) {
                showToast("내보낼 BGM 데이터가 없습니다.");
                return;
            }
            const headers = ["이름(지정명)", "원제(유튜브)", "유튜브 링크", "소속 폴더", "메모", "태그 목록"];
            const rows = bgms.map(bgm => {
                const folderObj = folders.find(f => f.id === bgm.folderId);
                const folderName = folderObj ? folderObj.name : "없음";
                const tagsStr = bgm.tags.join(', ');
                return [
                    bgm.customTitle,
                    bgm.realTitle,
                    bgm.youtubeUrl,
                    folderName,
                    bgm.memo || "",
                    tagsStr
                ];
            });
            const csvContent = [headers, ...rows].map(row => 
                row.map(value => {
                    const errorFreeValue = value === null || value === undefined ? "" : value;
                    const escaped = String(errorFreeValue).replace(/"/g, '""');
                    return `"${escaped}"`;
                }).join(',')
            ).join('\r\n');
            const BOM = "\uFEFF";
            const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", url);
            downloadAnchor.setAttribute("download", `bgm_manager_list_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
            URL.revokeObjectURL(url);
            showToast("BGM 리스트가 CSV 파일로 변환되었습니다!");
        }

        function extractYoutubeId(url) {
            if(!url) return null;
            const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#\&\?]*).*/;
            const match = url.match(regExp);
            if (match && match[7] && match[7].length === 11) return match[7].trim();
            try {
                if(url.includes('youtu.be/')) return url.split('youtu.be/')[1].split(/[?#&]/)[0].trim();
            } catch(e) {}
            return null;
        }

                const data = await response.json();
                return data.title || null;
            } catch (error) {
                return null;
            }
        }

        // [완전 우회] 프록시 없이 사용자가 복사한 유튜브 데이터 텍스트를 직접 분석하여 개별 등록하는 기능
        async function fetchAndAddPlaylist() {
            const urlInput = document.getElementById('playlist-url-input');
            const btn = document.getElementById('playlist-btn');
            const targetFolderId = document.getElementById('playlist-target-folder').value;
            const inputText = urlInput.value.trim();

            if (!inputText) {
                alert("유튜브 재생목록 페이지에서 아무 영역이나 전체 드래그(Ctrl+A) 후 복사(Ctrl+C)한 텍스트를 이 창에 붙여넣어 주세요!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "데이터 텍스트 파싱 중...";

            try {
                // 유튜브 페이지의 텍스트 구조에서 영상 ID(v=...)를 검출하는 정규식
                const videoIdReg = /(?:v=|shorts\/|embed\/|youtu\.be\/)([a-zA-Z0-9_-]{11})/g;
                let matches = [];
                let match;
                
                while ((match = videoIdReg.exec(inputText)) !== null) {
                    if (!matches.includes(match[1])) {
                        matches.push(match[1]);
                    }
                }

                if (matches.length === 0) {
                    alert("입력된 텍스트 데이터에서 유효한 유튜브 동영상 식별 코드를 찾아내지 못했습니다.\n재생목록 화면의 글자들을 드래그 복사해서 넣어주세요.");
                    return;
                }

                let addedCount = 0;

                // 찾아낸 영상 ID 개수만큼 돌며 개별 BGM 등록 처리
                for (let i = 0; i < matches.length; i++) {
                    const videoId = matches[i];

                    // 중복 등록 방지
                    if (!bgms.some(b => b.youtubeId === videoId)) {
                        // 제목은 API가 없으므로 임시 설정 (이후 재생 시 유튜브 플레이어가 실제 제목을 가져옵니다)
                        const placeholderTitle = `가져온 BGM 영상 (${videoId})`;

                        const newBgm = {
                            id: 'bgm_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                            youtubeUrl: "https://www.youtube.com/watch?v=" + videoId,
                            youtubeId: videoId,
                            realTitle: placeholderTitle,
                            customTitle: placeholderTitle,
                            memo: "재생목록 텍스트 파싱 추출본",
                            tags: [],
                            folderId: targetFolderId || null
                        };
                        bgms.push(newBgm);

                        if (targetFolderId) {
                            const folder = folders.find(f => f.id === targetFolderId);
                            if (folder) folder.bgmIds.push(newBgm.id);
                        }
                        addedCount++;
                    }
                }

                if (addedCount > 0) {
                    saveData();
                    if (typeof closePlaylistModal === 'function') closePlaylistModal();
                    else if (typeof closeAddModal === 'function') closeAddModal();
                    
                    showToast(`🎉 성공! 프록시 없이 총 ${addedCount}개의 영상을 개별 BGM으로 일괄 등록했습니다.`);
                    renderAll();
                } else {
                    alert("중복된 영상을 제외하고 새로 추가할 비디오가 발견되지 않았습니다.");
                }

            } catch (error) {
                console.error(error);
                alert("텍스트 가공 중 일시적 오류가 발생했습니다.");
            } finally {
                btn.disabled = false;
                btn.innerText = "불러오기";
            }
        }

        async function addMultipleBgm() {
            const textarea = document.getElementById('input-links');
            const lines = textarea.value.split('\n');
            const targetFolderId = document.getElementById('select-target-folder').value;
            let addedCount = 0;

            showToast('유튜브 정보를 분석하여 등록 중입니다...');

            for (const line of lines) {
                const trimmed = line.trim();
                if(!trimmed) continue;

                let customName = "";
                let targetUrl = trimmed;

                if (trimmed.includes(' - ')) {
                    const parts = trimmed.split(' - ');
                    customName = parts[0].trim();
                    targetUrl = parts[1].trim();
                }

                const ytId = extractYoutubeId(targetUrl);
                if(ytId) {
                    const cleanId = ytId.trim();
                    let fetchedTitle = await fetchYoutubeTitle(cleanId);
                    let finalRealTitle = fetchedTitle || `YouTube 비디오 (${cleanId})`;
                    let finalCustomName = customName || fetchedTitle || "이름 없는 BGM";

                    const newBgm = {
                        id: 'bgm_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                        youtubeUrl: `https://www.youtube.com/watch?v=${cleanId}`,
                        youtubeId: cleanId,
                        realTitle: finalRealTitle, 
                        customTitle: finalCustomName,
                        memo: '',
                        tags: [],
                        folderId: targetFolderId || null
                    };
                    bgms.push(newBgm);
                    
                    if(targetFolderId) {
                        const folder = folders.find(f => f.id === targetFolderId);
                        if(folder) folder.bgmIds.push(newBgm.id);
                    }
                    addedCount++;
                }
            }

            if(addedCount > 0) {
                saveData();
                closeAddModal();
                showToast(`${addedCount}개의 BGM 보관 완료!`);
                renderAll();
            } else {
                showToast('올바른 유튜브 링크를 찾을 수 없습니다.');
            }
        }

            });

            const playlistBox = document.getElementById('sidebar-playlists');
            playlistBox.innerHTML = '';
            if(playlists.length === 0) playlistBox.innerHTML = '<p class="text-[11px] text-gray-400 p-2 text-center w-full">생성된 플리가 없습니다.</p>';
            playlists.forEach(p => {
                const isSelected = (currentFilter.type === 'playlist' && currentFilter.id === p.id);
                playlistBox.innerHTML += `
                    <div class="flex justify-between items-center group px-2 py-1 rounded-lg transition-colors hover:bg-gray-50 w-full overflow-hidden ${isSelected?'bg-blue-50/70 text-custom-blue font-bold border border-blue-100':''}">
                        <button onclick="setFilter('playlist', '${p.id}', '${p.name}')" class="text-xs truncate text-left flex-1 cursor-pointer py-0.5 whitespace-nowrap min-w-0 pr-1">
                            🎧 ${p.name} <span class="text-[10px] text-gray-400 font-normal">(${p.bgmIds.length})</span>
                        </button>
                        <div class="flex gap-1.5 items-center opacity-0 group-hover:opacity-100 transition-opacity shrink-0">
                            <button onclick="renameContainer('playlist', '${p.id}', '${p.name}', event)" class="text-[10px] text-gray-400 hover:text-gray-600 cursor-pointer px-0.5" title="이름 수정">✏️</button>
                            <button onclick="deleteContainer('playlist', '${p.id}', event)" class="text-[9px] text-gray-400 hover:text-rose-600 cursor-pointer px-0.5" title="삭제">❌</button>
                        </div>
                    </div>`;
            });

            renderTagCloud();
            setSortMode(sortMode);
        }

        function renderTagCloud() {
            const tagContainer = document.getElementById('sidebar-tags');
            tagContainer.innerHTML = '';
            
            let allTagsMap = {};
            bgms.forEach(b => { b.tags.forEach(t => { allTagsMap[t] = (allTagsMap[t] || 0) + 1; }); });

            const tagKeys = Object.keys(allTagsMap);
            if(tagKeys.length === 0) {
                tagContainer.innerHTML = '<p class="text-[11px] text-gray-400 p-2 text-center w-full">등록된 태그가 없습니다.</p>';
                return;
            }

            tagKeys.forEach(tag => {
                const count = allTagsMap[tag];
                const isSelected = (currentFilter.type === 'tag' && currentFilter.value === tag);
                tagContainer.innerHTML += `
                    <button onclick="setFilter('tag', null, '${tag}')" class="text-[10px] px-2 py-0.5 rounded-md font-semibold border transition-all cursor-pointer whitespace-nowrap ${isSelected?'bg-custom-blue text-white border-custom-blue':'bg-gray-50 text-gray-500 border-gray-200 hover:bg-gray-100'}">
                        #${tag} (${count})
                    </button>
                `;
            });
        }

        function deleteContainer(type, id, event) {
            if(event) event.stopPropagation();
            if(!confirm('이 그룹을 보관함에서 해제할까요?')) return;
            if(type === 'folder') {
                folders = folders.filter(f => f.id !== id);
                bgms.forEach(b => { if(b.folderId === id) b.folderId = null; });
            } else {
                playlists = playlists.filter(p => p.id !== id);
            }
            currentFilter.type = 'all'; currentFilter.id = null;
            saveData(); renderAll();
        }

        function renderBgmList() {
            const listContainer = document.getElementById('bgm-list');
            const searchKeyword = document.getElementById('search-input').value.toLowerCase();
            
            if (sortableInstance) {
                sortableInstance.destroy();
                sortableInstance = null;
            }

            listContainer.innerHTML = '';
            listContainer.style.gridTemplateColumns = '';

            let targetList = [];
            if(currentFilter.type === 'all') {
                targetList = [...bgms];
            } else if(currentFilter.type === 'folder') {
                targetList = bgms.filter(b => b.folderId === currentFilter.id);
            } else if(currentFilter.type === 'playlist') {
                const pl = playlists.find(p => p.id === currentFilter.id);
                if(pl) targetList = pl.bgmIds.map(bid => bgms.find(b => b.id === bid)).filter(Boolean);
            } else if(currentFilter.type === 'tag') {
                targetList = bgms.filter(b => b.tags.includes(currentFilter.value));
            }

            if (sortMode === 'abc') {
                targetList.sort((a, b) => a.customTitle.localeCompare(b.customTitle, 'ko'));
            }

            if(searchKeyword) {
                targetList = targetList.filter(b => 
                    b.customTitle.toLowerCase().includes(searchKeyword) ||
                    b.realTitle.toLowerCase().includes(searchKeyword) ||
                    b.memo.toLowerCase().includes(searchKeyword) ||
                    b.tags.some(t => t.toLowerCase().includes(searchKeyword))
                );
            }

            document.getElementById('bgm-count').innerText = targetList.length + '개';

            if(targetList.length === 0) {
                listContainer.className = "w-full text-center py-16 text-gray-400 text-sm";
                listContainer.innerHTML = '조건에 일치하는 보관음원이 없습니다.';
                return;
            }

            if (viewMode === 'list') {
                listContainer.className = "space-y-3 w-full block";
                targetList.forEach(bgm => { listContainer.innerHTML += buildListItemHTML(bgm); });
            } else if (viewMode === 'list2') {
                listContainer.className = "grid grid-cols-1 lg:grid-cols-2 gap-4 w-full";
                targetList.forEach(bgm => { listContainer.innerHTML += buildListItemHTML(bgm); });
            } else {
                listContainer.className = `grid gap-4 w-full`;
                listContainer.style.gridTemplateColumns = `repeat(${cardCols}, minmax(0, 1fr))`;
                targetList.forEach(bgm => { listContainer.innerHTML += buildCardItemHTML(bgm); });
            }

            // 정렬 드래그 핸들 강제 바인딩 (자유 정렬 시에만 ☰ 영역 드래그 허용)
            if (sortMode === 'drag') {
                sortableInstance = new Sortable(listContainer, {
                    animation: 200,
                    ghostClass: 'sortable-ghost',
                    dragClass: 'sortable-drag',
                    handle: '.drag-handle', 
                    filter: "input, select, button, iframe, a",
                    preventOnFilter: false,
                    onEnd: function () {
                        const currentOrderIds = Array.from(listContainer.querySelectorAll('[data-bgm-id]')).map(el => el.getAttribute('data-bgm-id'));
                        
                        if (currentFilter.type === 'all') {
                            const reorderedBgms = [];
                            currentOrderIds.forEach(id => {
                                const found = bgms.find(b => b.id === id);
                                if (found) reorderedBgms.push(found);
                            });
                            bgms.forEach(b => {
                                if (!reorderedBgms.some(rb => rb.id === b.id)) reorderedBgms.push(b);
                            });
                            bgms = reorderedBgms;
                        } else if (currentFilter.type === 'playlist') {
                            const pl = playlists.find(p => p.id === currentFilter.id);
                            if (pl) {
                                pl.bgmIds = currentOrderIds;
                            }
                        } else if (currentFilter.type === 'folder') {
                            const folder = folders.find(f => f.id === currentFilter.id);
                            if (folder) {
                                folder.bgmIds = currentOrderIds;
                            }
                        }
                        
                        saveData();
                        showToast("정렬 순서가 보관함에 즉시 반영되었습니다.");
                    }
                });
            }
        }

        function buildSelectsHTML(bgm) {
            let folderOptions = `<option value="">폴더 선택</option>`;
            folders.forEach(f => { folderOptions += `<option value="${f.id}" ${bgm.folderId === f.id ? 'disabled' : ''}>${f.name}</option>`; });
            let playlistOptions = `<option value="">플리 담기</option>`;
            playlists.forEach(p => { playlistOptions += `<option value="${p.id}">+ ${p.name}</option>`; });

            return `
                <select onclick="event.stopPropagation()" onchange="if(this.value) moveBgmToContainer('${bgm.id}', 'folder', this.value, event)" class="bg-gray-50 text-[11px] text-gray-500 rounded border border-gray-200 p-1 focus:outline-none flex-1 min-w-[70px] max-w-[100px] truncate cursor-pointer">
                    ${folderOptions}
                </select>
                <select onclick="event.stopPropagation()" onchange="if(this.value) moveBgmToContainer('${bgm.id}', 'playlist', this.value, event); this.value='';" class="bg-gray-50 text-[11px] text-gray-500 rounded border border-gray-200 p-1 focus:outline-none flex-1 min-w-[70px] max-w-[100px] truncate cursor-pointer">
                    ${playlistOptions}
                </select>
            `;
        }

        function buildListItemHTML(bgm) {
            const tagBadges = bgm.tags.map(t => `<span class="bg-gray-100 text-gray-600 text-[10px] font-semibold px-2 py-0.5 rounded whitespace-nowrap">#${t}</span>`).join(' ');
            const folderObj = folders.find(f => f.id === bgm.folderId);
            const plObjects = playlists.filter(p => p.bgmIds.includes(bgm.id));

            let groupBadgesHtml = '';
            if(folderObj) {
                groupBadgesHtml += `<span class="bg-gray-100 text-gray-600 text-[10px] px-1.5 py-0.5 rounded border border-gray-200 font-bold whitespace-nowrap">📁 ${folderObj.name}</span>`;
            }
            if(plObjects.length > 0) {
                plObjects.forEach(p => {
                    groupBadgesHtml += `<span class="bg-gray-100 text-gray-600 text-[10px] px-1.5 py-0.5 rounded border border-gray-200 font-bold whitespace-nowrap">🎧 ${p.name}</span>`;
                });
            }

            return `
                <div data-bgm-id="${bgm.id}" onclick="openBgmModal('${bgm.id}')" class="bg-white px-4 py-4 rounded-xl border border-gray-200 hover:border-custom-blue hover:shadow-xs transition-all cursor-pointer flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 group w-full min-w-0">
                    <div class="flex-1 min-w-0 space-y-2">
                        <div class="flex items-center gap-2 flex-wrap min-w-0">
                            <!-- 직접 정렬(자유 정렬) 모드일 때만 드래그 ☰ 아이콘 노출 -->
                            ${sortMode === 'drag' ? '<span class="text-gray-400 text-base drag-handle px-1 select-none mr-1">☰</span>' : ''}
                            <h3 class="font-bold text-gray-800 text-sm group-hover:text-custom-blue transition-colors truncate max-w-full sm:max-w-[70%]">${bgm.customTitle}</h3>
                            <div class="flex gap-1 flex-wrap">${tagBadges}</div>
                        </div>
                        
                        <p class="text-[11px] text-gray-400 truncate">원본: ${bgm.realTitle}</p>
                        
                        <div class="flex flex-wrap items-center gap-1.5">
                            ${groupBadgesHtml || '<span class="text-[10px] text-gray-300">지정된 소속 그룹 없음</span>'}
                        </div>
                        
                        ${bgm.memo ? `<p class="text-[11px] text-gray-500 bg-gray-50 px-2 py-0.5 rounded border border-gray-100 inline-block truncate max-w-full">💬 ${bgm.memo}</p>` : ''}
                    </div>
                    <div class="flex items-center gap-2 shrink-0 sm:ml-auto justify-between sm:justify-end border-t sm:border-t-0 pt-2 sm:pt-0 border-gray-100">
                        <div class="flex gap-1 items-center w-[150px] sm:w-[170px]">${buildSelectsHTML(bgm)}</div>
                        <button onclick="copyLink('${bgm.youtubeUrl}', event)" class="bg-gray-100 hover:bg-custom-blue hover:text-white text-gray-600 text-xs px-2.5 py-1 rounded transition-colors font-medium cursor-pointer whitespace-nowrap min-w-[45px] text-center">복사</button>
                    </div>
                </div>`;
        }

        function buildCardItemHTML(bgm) {
            const tagBadges = bgm.tags.map(t => `<span class="bg-gray-50 text-gray-600 text-[10px] font-semibold px-1 py-0.5 rounded border border-gray-100 truncate max-w-[70px] inline-block">#${t}</span>`).join(' ');
            return `
                <div data-bgm-id="${bgm.id}" onclick="openBgmModal('${bgm.id}')" class="bg-white rounded-xl border border-gray-200 overflow-hidden hover:border-custom-blue hover:shadow-md transition-all cursor-pointer flex flex-col group">
                    <div class="w-full aspect-video bg-gray-100 relative overflow-hidden border-b border-b-gray-100">
                        <img src="${getYoutubeThumbnail(bgm.youtubeId)}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-200" alt="섬네일" loading="lazy">
                        <div class="absolute inset-0 bg-black/20 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <span class="bg-white text-gray-800 font-bold text-[10px] px-2.5 py-1 rounded-full shadow-md flex items-center gap-1">
                                ${sortMode === 'drag' ? '<span class="drag-handle text-xs font-black">☰ 드래그 핸들</span>' : '상세 플레이'}
                            </span>
                        </div>
                    </div>
                    <div class="p-2.5 flex-1 flex flex-col justify-between gap-2 min-w-0">
                        <div class="min-w-0 space-y-1">
                            <h3 class="font-bold text-gray-800 text-xs group-hover:text-custom-blue truncate">${bgm.customTitle}</h3>
                            <p class="text-[10px] text-gray-400 truncate">원본: ${bgm.realTitle}</p>
                            <div class="flex flex-wrap gap-0.5 pt-0.5 overflow-hidden max-h-5">${tagBadges}</div>
                            ${bgm.memo ? `<p class="text-[10px] text-gray-500 bg-gray-50 p-1 rounded border border-gray-100 truncate mt-1">💬 ${bgm.memo}</p>` : ''}
                        </div>
                        <div class="pt-2 border-t border-gray-100 flex items-center gap-1 mt-auto w-full">
                            ${buildSelectsHTML(bgm)}
                            <button onclick="copyLink('${bgm.youtubeUrl}', event)" class="bg-gray-50 hover:bg-custom-blue hover:text-white text-gray-500 text-[11px] p-1 rounded cursor-pointer font-medium text-center border border-gray-200 whitespace-nowrap flex-1 truncate">복사</button>
                        </div>
                    </div>
                </div>`;
        }

        function showToast(msg) {
            const el = document.getElementById('toast'); el.innerText = msg;
            el.classList.remove('opacity-0', 'pointer-events-none');
            setTimeout(() => { el.classList.add('opacity-0', 'pointer-events-none'); }, 2200);
        }

        renderAll();
    </script>
</body>
</html>
